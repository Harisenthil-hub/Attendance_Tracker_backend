version: '3.9'

services:

  backend:
    build: .

    container_name: attendance_backend

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: mysql:8.4

    container_name: attendance_mysql

    restart: always

    environment:
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: attendance_user
      MYSQL_PASSWORD: attendance_password
      MYSQL_ROOT_PASSWORD: rootpassword

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: